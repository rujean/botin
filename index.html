<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Lista de Precios — Botín de Oro</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#0d0d0d;--surface:#161616;--card:#1c1c1c;--border:#2e2a1a;
  --gold:#d4af37;--gold-lt:#f0d060;--terra:#c4922a;
  --text:#f5f0e8;--muted:#8a7a5a;--tag-bg:#221e0e;
  --shadow:0 8px 40px rgba(0,0,0,.75);--radius:14px;--accent-rgb:212,175,55;
}
[data-theme="marmol"]{
  --bg:#faf9f7;--surface:#ffffff;--card:#ffffff;--border:#e4dbd0;
  --gold:#8b1a3a;--gold-lt:#6b1230;--terra:#c4572a;
  --text:#1a1a1a;--muted:#9a8878;--tag-bg:#f2ece4;
  --shadow:0 4px 20px rgba(0,0,0,.08);--accent-rgb:139,26,58;
}
[data-theme="indigo"]{
  --bg:#0e0e1f;--surface:#141428;--card:#1a1a32;--border:#2e2e55;
  --gold:#a78bfa;--gold-lt:#c4b0fc;--terra:#60a5fa;
  --text:#e2e8f0;--muted:#6b7ab0;--tag-bg:#1e1e3c;
  --shadow:0 8px 40px rgba(0,0,0,.65);--accent-rgb:167,139,250;
}
[data-theme="sage"]{
  --bg:#f4f4f0;--surface:#fafafa;--card:#ffffff;--border:#d4dace;
  --gold:#7d9b76;--gold-lt:#556e50;--terra:#b85c38;
  --text:#1c1c1c;--muted:#8a9a88;--tag-bg:#e8ede6;
  --shadow:0 4px 20px rgba(0,0,0,.07);--accent-rgb:125,155,118;
}

html{font-family:'DM Sans',sans-serif;font-size:16px;}
body{
  background:var(--bg);color:var(--text);min-height:100vh;padding:0 0 80px;
  background-image:radial-gradient(ellipse 80% 50% at 50% -10%,rgba(var(--accent-rgb),.15),transparent);
  transition:background .4s,color .4s;
}
*,*::before,*::after{transition:background-color .3s,border-color .3s,color .3s;}

/* NAV */
.topnav{background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;}
.nav-inner{max-width:960px;margin:0 auto;padding:0 24px;height:56px;display:flex;align-items:center;gap:24px;}
.nav-brand{font-family:'Cormorant Garamond',serif;font-size:1.15rem;font-weight:700;color:var(--gold);white-space:nowrap;text-decoration:none;}
.nav-links{display:flex;gap:4px;flex:1;}
.nav-link{font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;color:var(--muted);text-decoration:none;padding:6px 14px;border-radius:50px;transition:color .2s,background .2s;}
.nav-link:hover{color:var(--text);background:rgba(var(--accent-rgb),.07);}
.nav-link.active{color:var(--gold);background:rgba(var(--accent-rgb),.1);}
.theme-switcher{display:flex;gap:7px;align-items:center;}
.theme-dot{width:20px;height:20px;border-radius:50%;border:2px solid transparent;cursor:pointer;padding:0;transition:transform .2s,box-shadow .2s,border-color .2s;opacity:.6;}
.theme-dot:hover{transform:scale(1.2);opacity:1;}
.theme-dot.active{border-color:var(--text);opacity:1;transform:scale(1.15);box-shadow:0 0 0 2px rgba(var(--accent-rgb),.4);}

/* HEADER */
header{text-align:center;padding:48px 24px 16px;}
header::after{content:'';display:block;width:60px;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:18px auto 0;}
.eyebrow{font-size:11px;font-weight:500;letter-spacing:.22em;text-transform:uppercase;color:var(--gold);margin-bottom:10px;}
h1{font-family:'Cormorant Garamond',serif;font-size:clamp(2rem,5vw,3.2rem);font-weight:700;line-height:1.1;color:var(--text);}
h1 span{color:var(--gold-lt);}
.header-sub{color:var(--muted);font-size:13px;margin-top:8px;}

/* CONTROLS */
.controls{max-width:860px;margin:28px auto 0;padding:0 20px;display:flex;gap:12px;flex-wrap:wrap;align-items:center;}
.search-wrap{position:relative;flex:1;min-width:200px;}
.search-wrap svg{position:absolute;left:16px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none;}
#search{width:100%;padding:11px 16px 11px 44px;background:var(--surface);border:1.5px solid var(--border);border-radius:50px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.9rem;outline:none;transition:border-color .2s;}
#search::placeholder{color:var(--muted);}
#search:focus{border-color:var(--gold);}
.filter-bar{display:flex;gap:6px;flex-wrap:wrap;}
.filt{font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;padding:6px 14px;border-radius:50px;border:1px solid var(--border);background:var(--tag-bg);color:var(--muted);cursor:pointer;transition:all .18s;}
.filt:hover{border-color:var(--gold);color:var(--text);}
.filt.active{background:var(--gold);border-color:var(--gold);color:var(--bg);}

/* STATS */
.stats{max-width:860px;margin:16px auto 0;padding:0 20px;display:flex;justify-content:space-between;font-size:13px;color:var(--muted);}
.stats strong{color:var(--gold-lt);}

/* PRICE TABLE */
.wrap{max-width:860px;margin:16px auto 0;padding:0 20px;}
.price-table{width:100%;border-collapse:collapse;background:var(--card);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);}
.price-table thead{background:var(--surface);}
.price-table th{font-size:10px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);padding:14px 16px;text-align:left;border-bottom:1px solid var(--border);}
.price-table th:last-child{text-align:right;}
.price-table td{padding:13px 16px;border-bottom:1px solid var(--border);font-size:14px;color:var(--text);vertical-align:middle;}
.price-table tr:last-child td{border-bottom:none;}
.price-table tr:hover td{background:rgba(var(--accent-rgb),.04);}
.cat-tag{display:inline-block;font-size:10px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--gold);background:rgba(var(--accent-rgb),.1);border:1px solid rgba(var(--accent-rgb),.2);padding:2px 8px;border-radius:50px;}
.price-cell{font-family:'Cormorant Garamond',serif;font-size:2.8rem;font-weight:700;color:var(--gold-lt);text-align:right;white-space:nowrap;line-height:1;}
.price-cell span{font-size:15px;font-weight:400;opacity:.6;margin-right:2px;vertical-align:super;}
.code{font-size:11px;color:var(--muted);}
mark{background:rgba(var(--accent-rgb),.25);color:var(--gold-lt);border-radius:3px;padding:0 2px;}

/* Print button */
.print-btn{display:flex;align-items:center;gap:6px;background:rgba(var(--accent-rgb),.1);border:1px solid rgba(var(--accent-rgb),.3);color:var(--gold);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;padding:8px 18px;border-radius:50px;cursor:pointer;transition:all .2s;margin-left:auto;}
.print-btn:hover{background:var(--gold);color:var(--bg);}

/* No results */
#no-results{text-align:center;padding:60px 20px;color:var(--muted);display:none;}

/* PRINT STYLES */
@media print {
  .topnav,.controls,.stats,.print-btn{display:none!important;}
  body{background:white!important;color:black!important;}
  .price-table{box-shadow:none!important;}
  .price-table th,.price-table td{color:black!important;border-color:#ccc!important;}
  .cat-tag{border:1px solid #ccc!important;color:#333!important;background:none!important;}
  .price-cell{color:#000!important;}
}
</style>
</head>
<body>

<nav class="topnav">
  <div class="nav-inner">
    <a class="nav-brand" href="index.html">Botín de Oro</a>
    <div class="nav-links">
      <a class="nav-link active" href="index.html">Lista de Precios</a>
      <a class="nav-link" href="dashboard.html">Dashboard</a>
      <a class="nav-link" href="catalogo.html">Catálogo</a>
    </div>
    <div class="theme-switcher">
      <button class="theme-dot active" data-theme="obsidiana" title="Obsidiana" style="background:#d4af37"></button>
      <button class="theme-dot"        data-theme="marmol"    title="Mármol"    style="background:#8b1a3a"></button>
      <button class="theme-dot"        data-theme="indigo"    title="Índigo"    style="background:#a78bfa"></button>
      <button class="theme-dot"        data-theme="sage"      title="Sage"      style="background:#7d9b76"></button>
    </div>
  </div>
</nav>

<header>
  <p class="eyebrow">Precios al público</p>
  <h1>Lista de <span>Precios</span></h1>
  <p class="header-sub">Solo precios de venta — uso interno restringido</p>
</header>

<div class="controls">
  <div class="search-wrap">
    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <input id="search" type="text" placeholder="Buscar producto…" autocomplete="off"/>
  </div>
  <div class="filter-bar" id="filters"></div>
  <button class="print-btn" onclick="window.print()">
    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <path d="M6 9V2h12v7"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/>
      <rect x="6" y="14" width="12" height="8"/>
    </svg>
    Imprimir
  </button>
</div>

<div class="stats">
  <span>Mostrando <strong id="count">0</strong> productos</span>
  <span id="search-label" style="font-style:italic;font-size:12px"></span>
</div>

<div class="wrap">
  <div id="no-results">No se encontraron productos para "<span id="query-echo"></span>"</div>
  <table class="price-table" id="price-table">
    <thead><tr>
      <th>Código</th>
      <th>Producto</th>
      <th>Categoría</th>
      <th style="text-align:right">Precio</th>
    </tr></thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<script>
let productos = [];
let currentQuery = '';
let currentCat = 'all';

function parseCSV(text) {
  const lines = text.trim().split('\n').map(l => l.trim()).filter(l => l);
  const sep = lines[0].includes(';') ? ';' : ',';
  return lines.slice(1).map(line => {
    const cols = []; let cur = '', inQ = false;
    for (const ch of line) {
      if (ch === '"') { inQ = !inQ; }
      else if (ch === sep && !inQ) { cols.push(cur); cur = ''; }
      else { cur += ch; }
    }
    cols.push(cur);
    return { id:cols[0].trim(), nombre:cols[1].trim(), categoria:cols[2].trim(),
             venta:parseFloat(cols[4]) };
  });
}

function fmt(n) { return n.toLocaleString('es-PE',{minimumFractionDigits:2,maximumFractionDigits:2}); }

function highlight(text, q) {
  if (!q) return text;
  const re = new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');
  return text.replace(re, '<mark>$1</mark>');
}

function buildFilters() {
  const cats = ['all', ...new Set(productos.map(p => p.categoria))];
  const el = document.getElementById('filters');
  el.innerHTML = cats.map(c =>
    `<button class="filt${c==='all'?' active':''}" data-cat="${c}">${c==='all'?'Todos':c}</button>`
  ).join('');
  el.addEventListener('click', e => {
    const btn = e.target.closest('.filt');
    if (!btn) return;
    document.querySelectorAll('.filt').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentCat = btn.dataset.cat;
    render();
  });
}

function render() {
  const q = currentQuery.toLowerCase().trim();
  const filtered = productos.filter(p => {
    const matchCat = currentCat === 'all' || p.categoria === currentCat;
    const matchQ = !q || p.nombre.toLowerCase().includes(q) || p.id.toLowerCase().includes(q) || p.categoria.toLowerCase().includes(q);
    return matchCat && matchQ;
  });

  document.getElementById('count').textContent = filtered.length;
  document.getElementById('search-label').textContent = q ? `"${currentQuery}"` : '';

  const noRes = document.getElementById('no-results');
  const tbl   = document.getElementById('price-table');

  if (filtered.length === 0) {
    noRes.style.display = 'block';
    tbl.style.display = 'none';
    document.getElementById('query-echo').textContent = currentQuery;
    return;
  }
  noRes.style.display = 'none';
  tbl.style.display = 'table';

  document.getElementById('tbody').innerHTML = filtered.map(p => `
    <tr>
      <td class="code">${p.id}</td>
      <td><strong>${highlight(p.nombre, currentQuery)}</strong></td>
      <td><span class="cat-tag">${p.categoria}</span></td>
      <td class="price-cell"><span>S/</span>${fmt(p.venta)}</td>
    </tr>`).join('');
}

fetch('productos.csv')
  .then(r => r.text())
  .then(text => { productos = parseCSV(text); buildFilters(); render(); });

let debounce;
document.getElementById('search').addEventListener('input', e => {
  clearTimeout(debounce);
  debounce = setTimeout(() => { currentQuery = e.target.value; render(); }, 120);
});

document.querySelectorAll('.theme-dot').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.theme-dot').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const t = btn.dataset.theme;
    if (t === 'obsidiana') document.documentElement.removeAttribute('data-theme');
    else document.documentElement.setAttribute('data-theme', t);
  });
});
</script>
</body>
</html>
