<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Catálogo de Productos</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #1a1208;
    --surface:   #251b0d;
    --card:      #2e2010;
    --border:    #4a3418;
    --gold:      #c9933a;
    --gold-lt:   #e8b96a;
    --terra:     #b85c38;
    --text:      #f0e4cc;
    --muted:     #9a8060;
    --tag-bg:    #3a2814;
    --shadow:    0 8px 40px rgba(0,0,0,.55);
    --radius:    14px;
  }

  html { font-family: 'DM Sans', sans-serif; font-size: 16px; }

  body {
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0 0 80px;
    background-image:
      radial-gradient(ellipse 80% 50% at 50% -10%, rgba(201,147,58,.18), transparent),
      url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23c9933a' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
  }

  /* ── HEADER ── */
  header {
    text-align: center;
    padding: 56px 24px 20px;
    position: relative;
  }
  header::after {
    content: '';
    display: block;
    width: 60px; height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: 20px auto 0;
  }
  .eyebrow {
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: .22em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 10px;
  }
  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(2.4rem, 6vw, 4rem);
    font-weight: 700;
    line-height: 1.1;
    color: var(--text);
  }
  h1 span { color: var(--gold-lt); }

  /* ── SEARCH BOX ── */
  .search-wrap {
    max-width: 620px;
    margin: 36px auto 0;
    padding: 0 20px;
    position: relative;
  }
  .search-icon {
    position: absolute;
    left: 38px; top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    pointer-events: none;
    transition: color .2s;
  }
  #search {
    width: 100%;
    padding: 17px 20px 17px 52px;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 50px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem;
    outline: none;
    transition: border-color .25s, box-shadow .25s;
    box-shadow: var(--shadow);
  }
  #search::placeholder { color: var(--muted); }
  #search:focus {
    border-color: var(--gold);
    box-shadow: 0 0 0 3px rgba(201,147,58,.15), var(--shadow);
  }
  #search:focus + .search-icon { color: var(--gold); }

  /* ── FILTERS ── */
  .filters {
    max-width: 900px;
    margin: 20px auto 0;
    padding: 0 20px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .filter-btn {
    background: var(--tag-bg);
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: .06em;
    padding: 6px 16px;
    border-radius: 50px;
    cursor: pointer;
    transition: all .2s;
  }
  .filter-btn:hover, .filter-btn.active {
    background: var(--gold);
    border-color: var(--gold);
    color: var(--bg);
  }

  /* ── STATS BAR ── */
  .stats {
    max-width: 900px;
    margin: 28px auto 0;
    padding: 0 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 13px;
    color: var(--muted);
  }
  .stats strong { color: var(--gold-lt); }
  #no-results {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
    font-size: 15px;
    display: none;
  }
  #no-results .icon { font-size: 40px; display: block; margin-bottom: 12px; }

  /* ── GRID ── */
  .grid {
    max-width: 900px;
    margin: 20px auto 0;
    padding: 0 20px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 18px;
  }

  /* ── CARD ── */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    position: relative;
    overflow: hidden;
    cursor: default;
    transition: transform .25s cubic-bezier(.34,1.56,.64,1), border-color .25s, box-shadow .25s;
    animation: fadeUp .35s ease both;
  }
  .card:hover {
    transform: translateY(-4px);
    border-color: var(--gold);
    box-shadow: 0 16px 48px rgba(0,0,0,.5), 0 0 0 1px rgba(201,147,58,.2);
  }
  .card::before {
    content: '';
    position: absolute;
    top: 0; right: 0;
    width: 100px; height: 100px;
    background: radial-gradient(circle at top right, rgba(201,147,58,.08), transparent 70%);
    pointer-events: none;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card-category {
    display: inline-block;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: .15em;
    text-transform: uppercase;
    color: var(--gold);
    background: rgba(201,147,58,.1);
    border: 1px solid rgba(201,147,58,.2);
    padding: 3px 10px;
    border-radius: 50px;
    margin-bottom: 14px;
  }

  .card-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.25rem;
    font-weight: 600;
    line-height: 1.3;
    color: var(--text);
    margin-bottom: 6px;
  }
  .card-name mark {
    background: rgba(201,147,58,.25);
    color: var(--gold-lt);
    border-radius: 3px;
    padding: 0 2px;
  }

  .card-sku {
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 20px;
    font-weight: 300;
  }

  .card-divider {
    height: 1px;
    background: linear-gradient(90deg, var(--border), transparent);
    margin-bottom: 18px;
  }

  .prices {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .price-block { }
  .price-label {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 4px;
  }
  .price-value {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.45rem;
    font-weight: 700;
    line-height: 1;
  }
  .price-value.venta  { color: var(--gold-lt); }
  .price-value.compra { color: var(--terra); }
  .price-currency {
    font-size: 13px;
    font-weight: 400;
    opacity: .7;
    margin-right: 2px;
  }

  .margin-badge {
    margin-top: 16px;
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11.5px;
    color: var(--muted);
  }
  .margin-pill {
    background: rgba(76, 175, 80, .12);
    color: #81c784;
    border: 1px solid rgba(76, 175, 80, .2);
    padding: 2px 8px;
    border-radius: 50px;
    font-size: 11px;
    font-weight: 500;
  }

  /* search highlight animation */
  .card.highlight-in { animation: pulse-gold .5s ease; }
  @keyframes pulse-gold {
    0%   { box-shadow: 0 0 0 0 rgba(201,147,58,.5); }
    70%  { box-shadow: 0 0 0 10px rgba(201,147,58,0); }
    100% { box-shadow: none; }
  }
</style>
</head>
<body>

<header>
  <p class="eyebrow">Sistema de Inventario</p>
  <h1>Catálogo de <span>Productos</span></h1>
</header>

<div class="search-wrap">
  <input type="text" id="search" placeholder="Buscar producto, categoría o código..." autocomplete="off" />
  <svg class="search-icon" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
    <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
  </svg>
</div>

<div class="filters" id="filters">
  <button class="filter-btn active" data-cat="all">Todos</button>
</div>

<div class="stats">
  <span>Mostrando <strong id="count">0</strong> productos</span>
  <span id="search-label"></span>
</div>

<div id="no-results">
  <span class="icon">🔍</span>
  No se encontraron productos para "<span id="query-echo"></span>"
</div>

<div class="grid" id="grid"></div>

<script>
const productos = [
  { id:'P001', nombre:'Arroz Costeño Extra 1kg',         categoria:'Abarrotes',   compra:3.20,  venta:4.50  },
  { id:'P002', nombre:'Aceite Primor 1L',                 categoria:'Abarrotes',   compra:6.80,  venta:9.50  },
  { id:'P003', nombre:'Azúcar Rubia 1kg',                 categoria:'Abarrotes',   compra:2.90,  venta:4.00  },
  { id:'P004', nombre:'Leche Gloria Evaporada 400g',      categoria:'Abarrotes',   compra:3.10,  venta:4.20  },
  { id:'P005', nombre:'Fideos Don Vittorio 500g',         categoria:'Abarrotes',   compra:2.40,  venta:3.50  },
  { id:'P006', nombre:'Detergente Ariel 500g',            categoria:'Limpieza',    compra:7.50,  venta:10.90 },
  { id:'P007', nombre:'Jabón Marsella x3',                categoria:'Limpieza',    compra:4.20,  venta:6.00  },
  { id:'P008', nombre:'Lejía Clorox 900ml',               categoria:'Limpieza',    compra:5.60,  venta:7.90  },
  { id:'P009', nombre:'Escoba Plástica Profesional',      categoria:'Limpieza',    compra:12.00, venta:18.00 },
  { id:'P010', nombre:'Trapeador Microfibra 360°',        categoria:'Limpieza',    compra:22.00, venta:35.00 },
  { id:'P011', nombre:'Cuaderno Universitario 100 hojas', categoria:'Útiles',      compra:5.50,  venta:8.50  },
  { id:'P012', nombre:'Lapicero BIC Cristal x12',         categoria:'Útiles',      compra:8.00,  venta:12.00 },
  { id:'P013', nombre:'Corrector Faber-Castell Líquido',  categoria:'Útiles',      compra:2.80,  venta:4.50  },
  { id:'P014', nombre:'Tijera Acero Inox 8"',             categoria:'Útiles',      compra:4.50,  venta:7.00  },
  { id:'P015', nombre:'Folder Manila A4 x25',             categoria:'Útiles',      compra:7.00,  venta:11.00 },
  { id:'P016', nombre:'Gaseosa Inca Kola 1.5L',           categoria:'Bebidas',     compra:4.20,  venta:6.00  },
  { id:'P017', nombre:'Agua San Luis 625ml',              categoria:'Bebidas',     compra:0.90,  venta:1.50  },
  { id:'P018', nombre:'Jugo Cifrut Naranja 1L',           categoria:'Bebidas',     compra:3.50,  venta:5.00  },
  { id:'P019', nombre:'Yogurt Gloria Fresa 1kg',          categoria:'Bebidas',     compra:8.50,  venta:12.50 },
  { id:'P020', nombre:'Café Nescafé Clásico 200g',        categoria:'Bebidas',     compra:14.00, venta:20.00 },
  { id:'P021', nombre:'Cemento Sol 42.5kg',               categoria:'Ferretería',  compra:22.00, venta:30.00 },
  { id:'P022', nombre:'Pintura Tekno Látex 4L',           categoria:'Ferretería',  compra:55.00, venta:75.00 },
  { id:'P023', nombre:'Cinta Maskintape 1"',              categoria:'Ferretería',  compra:1.80,  venta:3.00  },
  { id:'P024', nombre:'Silicona Transparente 280ml',      categoria:'Ferretería',  compra:9.50,  venta:15.00 },
  { id:'P025', nombre:'Foco LED 9W E27 Frío',             categoria:'Ferretería',  compra:5.50,  venta:9.00  },
];

// Build category filters
const cats = ['all', ...new Set(productos.map(p => p.categoria))];
const filtersEl = document.getElementById('filters');
filtersEl.innerHTML = cats.map(c =>
  `<button class="filter-btn${c==='all'?' active':''}" data-cat="${c}">${c==='all'?'Todos':c}</button>`
).join('');

let currentQuery = '';
let currentCat   = 'all';

function fmt(n) {
  return n.toLocaleString('es-PE', { minimumFractionDigits:2, maximumFractionDigits:2 });
}

function margin(compra, venta) {
  return (((venta - compra) / compra) * 100).toFixed(1);
}

function highlight(text, query) {
  if (!query) return text;
  const re = new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');
  return text.replace(re, '<mark>$1</mark>');
}

function render() {
  const q   = currentQuery.toLowerCase().trim();
  const cat = currentCat;
  const grid = document.getElementById('grid');
  const noRes = document.getElementById('no-results');

  let filtered = productos.filter(p => {
    const matchCat = cat === 'all' || p.categoria === cat;
    const matchQ   = !q ||
      p.nombre.toLowerCase().includes(q) ||
      p.categoria.toLowerCase().includes(q) ||
      p.id.toLowerCase().includes(q);
    return matchCat && matchQ;
  });

  document.getElementById('count').textContent = filtered.length;
  document.getElementById('search-label').textContent = q ? `"${currentQuery}"` : '';

  if (filtered.length === 0) {
    grid.innerHTML = '';
    noRes.style.display = 'block';
    document.getElementById('query-echo').textContent = currentQuery;
    return;
  }
  noRes.style.display = 'none';

  grid.innerHTML = filtered.map((p, i) => `
    <div class="card" style="animation-delay:${i*0.04}s">
      <span class="card-category">${p.categoria}</span>
      <div class="card-name">${highlight(p.nombre, currentQuery)}</div>
      <div class="card-sku">SKU: ${p.id}</div>
      <div class="card-divider"></div>
      <div class="prices">
        <div class="price-block">
          <div class="price-label">Precio Venta</div>
          <div class="price-value venta">
            <span class="price-currency">S/</span>${fmt(p.venta)}
          </div>
        </div>
        <div class="price-block">
          <div class="price-label">Precio Compra</div>
          <div class="price-value compra">
            <span class="price-currency">S/</span>${fmt(p.compra)}
          </div>
        </div>
      </div>
      <div class="margin-badge">
        Margen: <span class="margin-pill">+${margin(p.compra, p.venta)}%</span>
      </div>
    </div>
  `).join('');
}

// Search input
let debounce;
document.getElementById('search').addEventListener('input', e => {
  clearTimeout(debounce);
  debounce = setTimeout(() => {
    currentQuery = e.target.value;
    render();
  }, 120);
});

// Filters
filtersEl.addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentCat = btn.dataset.cat;
  render();
});

render();
</script>
</body>
</html>
